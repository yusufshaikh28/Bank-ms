<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>GoBank NetBanking</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
      margin: 0;
    }

    /* Sidebar */
    .sidebar {
      width: 220px;
      position: fixed;
      top: 0;
      left: 0;
      height: 100%;
      background: #1e3c72;
      color: #fff;
      display: flex;
      flex-direction: column;
      padding-top: 20px;
    }
    .sidebar h2 { text-align: center; font-size: 1.4rem; margin-bottom: 30px; }
    .sidebar a {
      color: #fff;
      text-decoration: none;
      padding: 15px 20px;
      display: block;
      transition: background 0.2s;
    }
    .sidebar a:hover { background: #2a5298; }

    /* Main content */
    .main {
      margin-left: 220px;
      padding: 40px;
    }

    .card-custom {
      border-radius: 16px;
      box-shadow: 0 10px 20px rgba(0,0,0,0.1);
      background: #fff;
      padding: 25px;
      margin-bottom: 30px;
    }

    #balance {
      font-size: 2rem;
      font-weight: 700;
      color: #28a745;
    }

    #history {
      max-height: 250px;
      overflow-y: auto;
    }

    input, select {
      border-radius: 8px;
    }

    .btn-custom {
      border-radius: 8px;
      font-weight: bold;
    }

    @media(max-width: 768px){
      .sidebar { width: 100%; height: auto; position: relative; }
      .main { margin-left: 0; padding: 20px; }
    }
  </style>
</head>
<body>

  <!-- Sidebar -->
  <div class="sidebar">
    <h2>💰 GoBank</h2>
    <a href="#" onclick="showLogin()">Login</a>
    <a href="#" onclick="showDashboard()">Dashboard</a>
    <a href="#" onclick="exitApp()">Logout</a>
  </div>

  <!-- Main Content -->
  <div class="main">

    <!-- Login Card -->
    <div id="loginCard" class="card-custom">
      <h3 class="mb-3">🔐 ATM Login</h3>
      <input type="number" id="account" class="form-control mb-2" placeholder="Account Number">
      <input type="password" id="pin" class="form-control mb-3" placeholder="PIN">
      <button class="btn btn-primary w-100 btn-custom mb-3" onclick="login()">Login</button>

      <hr>

      <h5 class="mb-2">New? Create Account</h5>
      <input type="number" id="newAccount" class="form-control mb-2" placeholder="Account Number">
      <input type="password" id="newPin" class="form-control mb-2" placeholder="PIN">
      <input type="number" id="initBalance" class="form-control mb-2" placeholder="Initial Balance">
      <button class="btn btn-success w-100 btn-custom" onclick="createAccount()">Create Account</button>
    </div>

    <!-- Dashboard Card -->
    <div id="bankCard" class="card-custom d-none">
      <h3>💳 Welcome, Customer</h3>
      <div class="mb-3">
        <p>Current Balance:</p>
        <p id="balance">$0.00</p>
      </div>

      <div class="mb-3">
        <input type="number" id="amount" class="form-control" placeholder="Enter Amount">
      </div>

      <div class="d-flex justify-content-between mb-3">
        <button class="btn btn-success btn-custom" onclick="deposit()"><i class="fa-solid fa-arrow-down"></i> Deposit</button>
        <button class="btn btn-warning btn-custom" onclick="withdraw()"><i class="fa-solid fa-arrow-up"></i> Withdraw</button>
        <button class="btn btn-danger btn-custom" onclick="exitApp()"><i class="fa-solid fa-right-from-bracket"></i> Logout</button>
      </div>

      <h5>📜 Transaction History</h5>
      <ul id="history" class="list-group"></ul>
    </div>

  </div>

  <script>
    let currentAccount = null;
    let currentPin = null;

    function showLogin() {
      document.getElementById('loginCard').classList.remove('d-none');
      document.getElementById('bankCard').classList.add('d-none');
    }

    function showDashboard() {
      if (currentAccount) {
        document.getElementById('loginCard').classList.add('d-none');
        document.getElementById('bankCard').classList.remove('d-none');
      }
    }

    async function createAccount() {
      const acc = parseInt(document.getElementById('newAccount').value);
      const pin = document.getElementById('newPin').value;
      const balance = parseFloat(document.getElementById('initBalance').value);

      const res = await fetch('/create', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ accountNumber: acc, pin: pin, balance: balance })
      });

      if (res.ok) alert("Account created successfully!");
      else alert("Failed: " + await res.text());
    }

    async function login() {
      const acc = parseInt(document.getElementById('account').value);
      const pin = document.getElementById('pin').value;

      const res = await fetch('/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ accountNumber: acc, pin: pin })
      });

      if (res.ok) {
        currentAccount = acc;
        currentPin = pin;
        showDashboard();
        getBalance();
      } else alert("Login failed!");
    }

    async function getBalance() {
      const res = await fetch(`/balance?account=${currentAccount}&pin=${currentPin}`);
      const data = await res.json();
      document.getElementById('balance').innerText = "$ " + data.balance.toFixed(2);
    }

    function addHistory(action, amount) {
      const history = document.getElementById('history');
      const li = document.createElement('li');
      li.classList.add('list-group-item');
      li.innerText = `${action}: $${amount.toFixed(2)}`;
      history.prepend(li);
    }

    async function deposit() {
      const amt = parseFloat(document.getElementById('amount').value);
      const res = await fetch(`/deposit?account=${currentAccount}&pin=${currentPin}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ amount: amt })
      });
      if (res.ok) { getBalance(); addHistory("Deposited", amt); document.getElementById('amount').value = ""; }
      else alert("Deposit failed!");
    }

    async function withdraw() {
      const amt = parseFloat(document.getElementById('amount').value);
      const res = await fetch(`/withdraw?account=${currentAccount}&pin=${currentPin}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ amount: amt })
      });
      if (res.ok) { getBalance(); addHistory("Withdrew", amt); document.getElementById('amount').value = ""; }
      else alert("Withdraw failed!");
    }

    function exitApp() {
      currentAccount = null;
      currentPin = null;
      showLogin();
      document.getElementById('history').innerHTML = "";
      alert("Logged out successfully!");
    }

  </script>
</body>
</html>
